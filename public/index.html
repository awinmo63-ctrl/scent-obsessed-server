    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              obsessed: {
                black: '#1a1a1a',
                charcoal: '#242424',
                cream: '#f5f5f0',
                gold: '#d4af37',
                sapphire: '#0f52ba',
                emerald: '#046307',
                'gold-dim': '#aa8c2c'
              }
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              display: ['"Cinzel"', 'serif'],
              sans: ['"Montserrat"', 'sans-serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>

      }

        background: rgba(26, 26, 26, 0.95);
        backdrop-filter: blur(12px);
        border-left: 1px solid rgba(212, 175, 55, 0.2);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

</head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useState, useEffect, useRef, useMemo } from 'react';
      import ReactDOM from 'react-dom/client';
      import * as d3 from 'd3';
      import { Menu, Search, ShoppingBag, ArrowDown, X, Plus, Minus, MessageCircle, Box, User, LogOut, Droplet, Sparkles } from 'lucide-react';
      import { createClient } from '@supabase/supabase-js';

      const h = React.createElement;

      // --- SUPABASE INITIALIZATION ---
      const supabaseUrl = 'https://dyfasmiifyhfvuzcbjlp.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5ZmFzbWlpZnloZnZ1emNiamxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI3NjAsImV4cCI6MjA4ODEyODc2MH0.0PkXE4FEKUnUtIXVehmyz-NRCNPqQyPMk1Mqdz-GUsA'; 
      const supabase = createClient(supabaseUrl, supabaseKey);

      const PRODUCTS = [
        {
          id: 'blue-monarch',
          name: 'Blue Monarch',
          tagline: 'Rule Your Realm',
          narrative: "Ascend to a new level of sophistication with Blue Monarch by Scent Obsessed. This is a fragrance for those who write their own rules—a tribute to absolute freedom, power, and timeless elegance.",
          price: "₹ 720",
          originalPrice: "₹ 2,499",
          colorHex: '#0f52ba', 
          imageUrl: './blue_monarch.png', 
          bottleColor: 'sapphire',
          modelSrc: './blue_monarch.glb',
          orientation: '0deg -90deg 0deg'
        },
        {
          id: 'urban-ember',
          name: 'Urban Ember',
          tagline: 'Ignite Your Presence',
          narrative: "Capture the electric energy of the city at twilight with Urban Ember by Scent Obsessed. This fragrance is designed for the modern trailblazer who commands attention without saying a word.",
          price: "₹ 720",
          originalPrice: "₹ 2,499",
          colorHex: '#d4af37', 
          imageUrl: './urban_ember.png',
          bottleColor: 'white',
          modelSrc: './urban_ember.glb',
          orientation: '0deg -90deg 0deg'
        },
        {
          id: 'flora-essence',
          name: 'Flora Essence',
          tagline: 'The Scent of Sunlight',
          narrative: "Capture the golden glow of a blooming garden at dawn with Flora Essence by Scent Obsessed. This is a fragrance that celebrates light, nature, and pure optimism.",
          price: "₹ 720",
          originalPrice: "₹ 2,499",
          colorHex: '#046307', 
          imageUrl: './flora_essence.jpeg', 
          bottleColor: 'emerald',
          modelSrc: './flora_essence.glb',
          orientation: '0deg 0deg 0deg'
        },
        {
          id: 'savage-wind',
          name: 'Savage Wind',
          tagline: 'Unleash the Storm',
          narrative: "Experience the rush of the untamed with Savage Wind by Scent Obsessed. This fragrance is a powerful force of nature, designed for the free spirit who refuses to be tamed.",
          price: "₹ 720",
          originalPrice: "₹ 2,499",
          colorHex: '#555555', 
          imageUrl: './savage_wind.png', 
          bottleColor: 'black',
          modelSrc: './savage_wind.glb',
          orientation: '0deg 0deg 0deg'
        }
      ];

      const parsePrice = (priceStr) => parseInt(priceStr.replace(/[^0-9]/g, ''), 10);
      const formatPrice = (amount) => "₹ " + amount.toLocaleString('en-IN');

      // --- PERMANENT FLOATING LOYALTY WIDGET ---
      const FloatingLoyaltyVessel = ({ user, loyaltyMl, showShine, onClaim }) => {
        if (!user) return null;
        const percentage = Math.min((loyaltyMl / 100) * 100, 100);
        const mlLeft = Math.max(0, 100 - loyaltyMl);

        return h('div', { className: "fixed bottom-24 md:bottom-8 left-4 md:left-8 z-50 bg-[#111]/90 backdrop-blur-md p-4 rounded-xl flex items-center gap-4 border border-obsessed-gold/30 shadow-[0_0_20px_rgba(0,0,0,0.8)] transition-all duration-500 hover:border-obsessed-gold hover:shadow-[0_0_30px_rgba(212,175,55,0.15)] group" },
           
           h('div', { className: "relative w-10 h-16 md:w-12 md:h-20 flex-shrink-0" },
              h('img', { src: './urban_ember.png', className: "absolute inset-0 w-full h-full object-contain opacity-20 grayscale" }),
              h('img', { 
                  src: './urban_ember.png', 
                  className: "absolute inset-0 w-full h-full object-contain drop-shadow-[0_0_12px_rgba(212,175,55,0.8)] transition-all duration-[2000ms] ease-in-out", 
                  style: { filter: 'sepia(1) saturate(3) hue-rotate(-15deg) brightness(1.3)', clipPath: `inset(calc(100% - ${percentage}%) 0 0 0)` } 
              }),
              showShine && h('div', { className: "absolute inset-0 bg-white/50 blur-md animate-pulse mix-blend-overlay rounded-full" })
           ),

           h('div', { className: "flex flex-col" },
              h('p', { className: "font-display text-obsessed-gold text-[10px] md:text-xs tracking-[0.2em] uppercase mb-1" }, "Loyalty Vessel"),
              h('p', { className: "font-mono text-white text-[10px] tracking-widest mb-1" }, `${loyaltyMl} / 100 ML`),
              mlLeft > 0 
                  ? h('p', { className: "font-sans text-gray-500 text-[8px] md:text-[9px] tracking-[0.1em] uppercase group-hover:text-gray-300 transition-colors" }, `${mlLeft} ML to Free Bottle`)
                  : h('button', { onClick: onClaim, className: "mt-1 px-3 py-1.5 bg-obsessed-gold text-black text-[9px] font-bold uppercase tracking-widest animate-pulse hover:bg-white transition-colors" }, "Claim Free Bottle")
           )
        );
      };

      const VisualsLayer = ({ products, activeIndex, is3DMode }) => {
        const safeProducts = products.length > 0 ? products : [];
        return h('div', { className: "fixed inset-0 z-0 pointer-events-none overflow-hidden bg-obsessed-black transition-colors duration-1000 ease-in-out" },
          safeProducts.length > 0 && h('div', {
            className: "absolute inset-0 opacity-20 transition-all duration-1000",
            style: { background: `radial-gradient(circle at 50% 50%, ${safeProducts[activeIndex]?.colorHex || '#1a1a1a'} 0%, transparent 70%)` }
          }),
          safeProducts.map((product, index) => {
            const isActive = index === activeIndex;
            const isPrev = index === activeIndex - 1;
            const isNext = index === activeIndex + 1;
            let transformStyle = {}; let opacity = 0; let zIndex = 0; let filter = 'none'; let pointerEvents = 'none';
            
            if (isActive) { opacity = 1; zIndex = 10; transformStyle = { transform: `translate(-50%, -50%) scale(1)`, top: '45%', left: '50%' }; pointerEvents = is3DMode ? 'auto' : 'none'; } 
            else if (isPrev) { opacity = 0.6; zIndex = 5; transformStyle = { transform: `translate(-50%, 0%) scale(0.15)`, top: 'auto', bottom: '2rem', left: '50%' }; filter = 'grayscale(100%)'; } 
            else if (isNext) { opacity = 0; zIndex = 1; }
            
            return h('div', { key: product.id, className: `absolute transition-all duration-1000 ease-in-out will-change-transform w-[85vw] h-[50vh] md:w-[60vh] md:h-[80vh]`, style: { ...transformStyle, opacity: opacity, zIndex: zIndex, filter: filter, pointerEvents: pointerEvents } },
              h('div', { className: "relative w-full h-full" },
                h('div', { className: "absolute inset-0 rounded-full blur-3xl opacity-40 transform scale-75", style: { backgroundColor: product.colorHex } }),
                is3DMode ? h('model-viewer', {
                    src: product.modelSrc, orientation: product.orientation, 'auto-rotate': 'true', 'camera-controls': 'true', 'rotation-per-second': '30deg',
                    style: { width: '100%', height: '100%', backgroundColor: 'transparent', position: 'relative', zIndex: 20, pointerEvents: 'auto' },
                    className: "w-full h-full cursor-grab"
                }) : h('img', { 
                    src: product.imageUrl, alt: product.name, 
                    className: "w-full h-full object-cover rounded-t-full rounded-b-lg shadow-2xl", 
                    style: { boxShadow: `0 25px 50px -12px ${product.colorHex}40`, border: '1px solid rgba(255,255,255,0.1)' } 
                }),
                !is3DMode && h('div', { className: "absolute bottom-10 w-full text-center pointer-events-none" }, h('h3', { className: "font-display text-obsessed-gold text-2xl tracking-[0.2em] opacity-80 mix-blend-overlay" }, product.name.split(' ')[0]))
              )
            );
          }),
          activeIndex > 0 && h('div', { className: "absolute bottom-4 left-1/2 -translate-x-1/2 text-xs font-sans tracking-[0.3em] text-obsessed-gold opacity-50 z-20 pointer-events-none" }, "PREVIOUS SCENTS")
        );
      };

      const OrdersSidebar = ({ isOpen, onClose, user, orders, onLogout }) => {
        return h('div', { className: `fixed inset-y-0 right-0 z-50 w-full md:w-96 glass-panel transform transition-transform duration-500 ease-out ${isOpen ? 'translate-x-0' : 'translate-x-full'}` },
          h('div', { className: "flex flex-col h-full p-8" },
            h('div', { className: "flex justify-between items-center mb-6" },
              h('h2', { className: "font-display text-xl text-obsessed-gold tracking-[0.2em]" }, "MY PROFILE"),
              h('button', { onClick: onClose, className: "text-gray-400 hover:text-white" }, h(X, { size: 24 }))
            ),
            user ? h(React.Fragment, null,
              h('div', { className: "mb-8 pb-6 border-b border-gray-800" },
                h('p', { className: "text-white font-sans text-sm mb-1" }, user.user_metadata?.full_name || user.email),
                h('button', { onClick: onLogout, className: "mt-4 flex items-center gap-2 text-[10px] text-gray-400 hover:text-white uppercase tracking-widest transition-colors" }, h(LogOut, { size: 12 }), "Sign Out" )
              ),
              h('h3', { className: "font-sans text-[10px] tracking-[0.2em] text-obsessed-gold uppercase mb-4" }, "Order History"),
              h('div', { className: "flex-1 overflow-y-auto pr-2 space-y-4 no-scrollbar" },
                orders.length === 0 ? h('div', { className: "text-gray-500 font-serif italic text-sm" }, "No past acquisitions found.") :
                orders.map(order => (
                  h('div', { key: order.id, className: "bg-obsessed-charcoal/50 p-4 border border-gray-800 rounded" },
                    h('div', { className: "flex justify-between items-start mb-2" },
                      h('p', { className: "text-white font-mono text-xs" }, order.order_id.substring(0, 15) + '...'),
                      h('span', { className: `text-[9px] uppercase tracking-widest px-2 py-1 rounded ${order.payment_status === 'PAID' ? 'bg-green-900/30 text-green-400' : 'bg-obsessed-gold/20 text-obsessed-gold'}` }, order.payment_status.replace('_', ' '))
                    ),
                    h('p', { className: "text-gray-400 text-xs mb-2" }, new Date(order.created_at).toLocaleDateString()),
                    h('p', { className: "text-obsessed-gold font-display text-sm" }, formatPrice(order.total_amount))
                  )
                ))
              )
            ) : h('div', { className: "flex flex-col items-center justify-center h-full text-center" },
                h(User, { size: 48, className: "text-gray-600 mb-4" }),
                h('p', { className: "text-gray-400 font-serif italic mb-8" }, "Sign in to view your collection, track your acquisitions, and earn loyalty rewards."),
                h('button', { onClick: async () => { await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } }); }, className: "w-full py-3 bg-white text-black font-sans font-bold uppercase tracking-[0.2em] hover:bg-gray-200 transition-colors flex items-center justify-center gap-2" }, "Log in with Google" )
            )
          )
        );
      };

      const CartSidebar = ({ isOpen, onClose, cart, updateQty, checkout, formData, setFormData, user }) => {
        // Ignored reward items from subtotal calculation!
        const totalAmount = cart.reduce((sum, item) => sum + (item.isReward ? 0 : parsePrice(item.price) * item.qty), 0);

        return h('div', { className: `fixed inset-y-0 right-0 z-50 w-full md:w-96 glass-panel transform transition-transform duration-500 ease-out ${isOpen ? 'translate-x-0' : 'translate-x-full'}` },
          h('div', { className: "flex flex-col h-full p-8" },
            h('div', { className: "flex justify-between items-center mb-6" },
              h('h2', { className: "font-display text-2xl text-obsessed-gold tracking-[0.2em]" }, "YOUR COLLECTION"),
              h('button', { onClick: onClose, className: "text-gray-400 hover:text-white" }, h(X, { size: 24 }))
            ),
            h('div', { className: "flex-1 overflow-y-auto pr-2 space-y-6 no-scrollbar" },
              cart.length === 0 ? h('div', { className: "h-full flex items-center justify-center text-gray-500 font-serif italic" }, "Your vessel is empty.") :
                h(React.Fragment, null, 
                  cart.map(item => (
                    h('div', { key: item.id, className: "flex items-start gap-4 border-b border-gray-800 pb-4" },
                      h('img', { src: item.imageUrl, className: "w-16 h-20 object-cover rounded border border-gray-800" }),
                      h('div', { className: "flex-1" },
                        h('h4', { className: "font-display text-sm text-white mb-1" }, item.name),
                        h('div', { className: "flex items-baseline gap-2 mb-2" },
                          h('p', { className: `text-xs ${item.isReward ? 'text-green-400 font-bold' : 'text-obsessed-gold'}` }, item.price),
                          item.originalPrice ? h('p', { className: "text-gray-600 text-[10px] line-through" }, item.originalPrice) : null
                        ),
                        // Remove Plus/Minus buttons for the Free Reward
                        item.isReward 
                           ? h('span', { className: "text-[9px] font-sans text-obsessed-gold uppercase tracking-widest bg-obsessed-gold/10 px-2 py-1 border border-obsessed-gold/30 rounded" }, "Loyalty Reward") 
                           : h('div', { className: "flex items-center gap-3" },
                              h('button', { onClick: () => updateQty(item.id, -1), className: "p-1 hover:bg-gray-800 rounded" }, h(Minus, { size: 12 })),
                              h('span', { className: "text-xs font-mono" }, item.qty),
                              h('button', { onClick: () => updateQty(item.id, 1), className: "p-1 hover:bg-gray-800 rounded" }, h(Plus, { size: 12 }))
                            )
                      )
                    )
                  )),
                  cart.length > 0 && h('div', { className: "mt-6 border-t border-gray-800 pt-6 space-y-4" },
                    h('h3', { className: "font-sans text-[10px] tracking-[0.2em] text-obsessed-gold uppercase mb-2" }, "Delivery Details"),
                    h('input', { type: "text", placeholder: "Full Name", value: formData.name, onChange: (e) => setFormData({...formData, name: e.target.value}), className: "w-full bg-transparent border border-gray-800 rounded p-3 text-sm text-white placeholder-gray-600 focus:border-obsessed-gold outline-none transition-colors" }),
                    h('input', { type: "tel", placeholder: "Phone Number (e.g., 9876543210)", value: formData.phone, onChange: (e) => setFormData({...formData, phone: e.target.value}), className: "w-full bg-transparent border border-gray-800 rounded p-3 text-sm text-white placeholder-gray-600 focus:border-obsessed-gold outline-none transition-colors" }),
                    h('input', { type: "email", placeholder: "Email Address", value: formData.email, onChange: (e) => setFormData({...formData, email: e.target.value}), className: "w-full bg-transparent border border-gray-800 rounded p-3 text-sm text-white placeholder-gray-600 focus:border-obsessed-gold outline-none transition-colors" }),
                    h('textarea', { placeholder: "Complete Shipping Address with PIN Code", value: formData.address, onChange: (e) => setFormData({...formData, address: e.target.value}), className: "w-full bg-transparent border border-gray-800 rounded p-3 text-sm text-white placeholder-gray-600 focus:border-obsessed-gold outline-none transition-colors resize-none h-20" })
                  )
                )
            ),
            h('div', { className: "mt-4 pt-6 border-t border-obsessed-gold/20" },
              h('div', { className: "flex justify-between items-end mb-6" },
                h('span', { className: "font-sans text-xs tracking-widest text-gray-400 uppercase" }, "Total"),
                h('span', { className: "font-display text-2xl text-white" }, formatPrice(totalAmount))
              ),
              h('button', { 
                onClick: () => {
                  if (!user) { alert("Please Sign In via the Profile Menu to secure your acquisition and earn Loyalty Rewards."); onClose(); return; }
                  checkout();
                }, 
                disabled: cart.length === 0, 
                className: "w-full py-4 bg-obsessed-gold text-obsessed-black font-sans font-bold uppercase tracking-[0.2em] hover:bg-white transition-colors flex items-center justify-center gap-2 disabled:opacity-50" 
              },
                h(Box, { size: 18 }), "Secure Checkout"
              )
            )
          )
        );
      };

      const Navigation = ({ onCartClick, onOrdersClick, onMenuClick, cartItemCount, is3DMode, onToggle3D, user }) => {
        return h('nav', { className: "fixed top-0 left-0 right-0 z-40 flex justify-between items-center px-6 md:px-8 py-6 mix-blend-difference text-obsessed-cream pointer-events-none" },
          h('div', { className: "pointer-events-auto cursor-pointer hover:text-obsessed-gold transition-colors", onClick: onMenuClick }, h(Menu, { size: 24, strokeWidth: 1 }) ),
          h('div', { className: "text-center pointer-events-auto absolute left-1/2 -translate-x-1/2 md:static md:translate-x-0" }, 
            h('h1', { className: "font-display text-xl md:text-2xl tracking-[0.3em] font-bold text-obsessed-gold whitespace-nowrap" }, "SCENT OBSESSED"), 
            h('p', { className: "font-sans text-[0.5rem] md:text-[0.6rem] tracking-[0.5em] mt-1 text-white uppercase opacity-70 hidden md:block" }, "EAU DE PARFUM") 
          ),
          h('div', { className: "flex gap-4 md:gap-6 pointer-events-auto items-center" },
            h('button', { onClick: onToggle3D, className: `hidden md:flex items-center gap-2 border ${is3DMode ? 'border-obsessed-gold text-obsessed-gold bg-obsessed-gold/10' : 'border-gray-500 text-gray-300'} px-3 py-1 rounded-sm hover:border-obsessed-gold hover:text-obsessed-gold transition-colors text-[10px] md:text-xs font-sans tracking-widest uppercase` }, 
              h(Box, { size: 14 }), h('span', null, is3DMode ? "3D Active" : "View 3D")
            ),
            h('button', { onClick: onOrdersClick, className: `hover:text-obsessed-gold transition-colors ${user ? 'text-obsessed-gold' : 'text-white'}` }, h(User, { size: 20, strokeWidth: 1 }) ),
            h('button', { onClick: onCartClick, className: "hover:text-obsessed-gold transition-colors relative" }, h(ShoppingBag, { size: 20, strokeWidth: 1 }), cartItemCount > 0 && h('span', { className: "absolute -top-2 -right-2 bg-obsessed-gold text-black text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" }, cartItemCount) )
          )
        );
      };

      const SuccessModal = ({ isOpen, onTriggerMist, orderId }) => {
        if (!isOpen) return null;
        return h('div', { className: "fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-fade-in pointer-events-auto" },
          h('div', { className: "relative w-full max-w-md bg-[#111] border border-obsessed-gold/40 p-10 text-center shadow-[0_0_50px_rgba(212,175,55,0.1)] flex flex-col items-center" },
            h('div', { className: "w-20 h-20 rounded-full bg-obsessed-gold/10 flex items-center justify-center mb-6 border border-obsessed-gold/40 animate-pulse-fast" },
              h(Droplet, { size: 40, className: "text-obsessed-gold" })
            ),
            h('h2', { className: "font-display text-3xl text-obsessed-gold tracking-widest uppercase mb-4" }, "Acquisition Complete"),
            h('p', { className: "font-sans text-xs text-gray-400 leading-relaxed mb-6" }, "Your essence is being prepared. Your earned ML has been poured into your vessel."),
            orderId && h('p', { className: "font-mono text-[10px] text-obsessed-gold mb-8 bg-black px-4 py-2 border border-obsessed-gold/30 tracking-widest" }, `ID: ${orderId}`),
            h('button', { onClick: onTriggerMist, className: "w-full py-4 bg-obsessed-gold text-black font-sans font-bold uppercase tracking-[0.2em] hover:bg-white transition-colors shadow-[0_0_15px_rgba(212,175,55,0.4)]" }, "Extract Golden Essence")
          )
        );
      };

      const App = () => {
        const [activeSection, setActiveSection] = useState(0);
        const [cart, setCart] = useState([]);
        const [isCartOpen, setIsCartOpen] = useState(false);
        const [isMenuOpen, setIsMenuOpen] = useState(false);
        
        const [user, setUser] = useState(null);
        const [isOrdersOpen, setIsOrdersOpen] = useState(false);
        const [myOrders, setMyOrders] = useState([]);
        const [loyaltyMl, setLoyaltyMl] = useState(0);
        
        const [formData, setFormData] = useState({ name: '', phone: '', email: '', address: '' });
        const [is3DMode, setIs3DMode] = useState(false);
        
        const [showSuccess, setShowSuccess] = useState(false);
        const [successOrderId, setSuccessOrderId] = useState("");
        
        const [mistState, setMistState] = useState('idle'); // 'idle'|'blooming'|'flying'|'claiming_bloom'|'claiming_fly'
        const [showShine, setShowShine] = useState(false);

        const observerRefs = useRef([]);

        useEffect(() => {
          supabase.auth.getSession().then(({ data: { session } }) => {
            if (session?.user) { setUser(session.user); setFormData(prev => ({...prev, email: session.user.email, name: session.user.user_metadata?.full_name || ''})); }
          });
          const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
            setUser(session?.user ?? null);
            if (session?.user) { setFormData(prev => ({...prev, email: session.user.email, name: session.user.user_metadata?.full_name || ''})); }
          });
          return () => subscription.unsubscribe();
        }, []);

        // URL Check for Success
        useEffect(() => {
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('success') === 'true') {
            setShowSuccess(true);
            setSuccessOrderId(urlParams.get('order_id'));
            window.history.replaceState({}, document.title, window.location.pathname);
            setCart([]); 
          }
        }, []);

        // Fetch Data
        useEffect(() => {
            const fetchProfileData = async () => {
                if (!user) return;
                const { data: ordersData } = await supabase.from('orders').select('*').eq('customer_email', user.email).order('created_at', { ascending: false });
                if (ordersData) setMyOrders(ordersData);

                const { data: profileData } = await supabase.from('profiles').select('*').eq('email', user.email).single();
                if (!profileData) {
                    await supabase.from('profiles').insert([{ id: user.id, email: user.email, loyalty_ml: 0 }]);
                    setLoyaltyMl(0);
                } else {
                    setLoyaltyMl(profileData.loyalty_ml);
                }
            };
            fetchProfileData();
        }, [user, isOrdersOpen, showSuccess]); // Refresh when success closes

        // --- ANIMATIONS ---
        const handleTriggerPurchaseMist = () => {
            setShowSuccess(false);
            setMistState('blooming'); 
            setTimeout(() => setMistState('flying'), 200);
            setTimeout(() => {
                setMistState('idle'); 
                setShowShine(true); 
                // We don't artificially add it here anymore, the DB refresh handles the real math!
                setTimeout(() => setShowShine(false), 2000);
            }, 1400);
        };

        const handleClaimFreeBottle = () => {
            if (loyaltyMl < 100) return;
            
            // 1. Trigger the cinematic claim animation (flies to the Cart top right)
            setMistState('claiming_bloom');
            setTimeout(() => setMistState('claiming_fly'), 200);

            setTimeout(() => {
                setMistState('idle');
                
                // 2. Add the free bottle directly to their cart
                const freeBottle = {
                    id: 'free-reward-' + Date.now(),
                    name: 'Free 100ML Essence',
                    tagline: 'Your Loyalty Rewarded',
                    price: "₹ 0", 
                    originalPrice: "₹ 2,499",
                    colorHex: '#d4af37',
                    imageUrl: './urban_ember.png',
                    qty: 1,
                    isReward: true // Special tag
                };
                
                setCart(prev => [...prev, freeBottle]);
                
                // 3. Pop the cart open to show them the ₹ 0 price!
                setIsCartOpen(true);
                
                // NOTE: We only deduct the 100 ML from the database when they actually COMPLETE the checkout.
                // This prevents them from losing points if they close the window!
            }, 1400);
        };

        const addToCart = (product) => {
          setCart(prev => {
            const existing = prev.find(item => item.id === product.id && !item.isReward);
            if (existing) return prev.map(item => item.id === product.id && !item.isReward ? { ...item, qty: item.qty + 1 } : item);
            return [...prev, { ...product, qty: 1 }];
          });
          setIsCartOpen(true);
        };

        const updateQty = (id, delta) => { setCart(prev => prev.map(item => item.id === id && !item.isReward ? { ...item, qty: Math.max(0, item.qty + delta) } : item).filter(item => item.qty > 0 || item.isReward)); };

        const handleCheckout = async () => {
          if (!formData.name || !formData.phone || !formData.email || !formData.address) { alert("Please fill out all Delivery Details."); return; }
          
          // Calculate the true totals
          const totalPaidItems = cart.filter(item => !item.isReward).reduce((sum, item) => sum + item.qty, 0);
          const hasReward = cart.some(item => item.isReward);
          
          // Math: They earn 20 ML for every bottle they PAY for.
          const earnedRewardMl = totalPaidItems * 20; 
          // Math: If they have a Free Bottle in the cart, we need to subtract 100 ML from their profile.
          const claimedRewardMl = hasReward ? 100 : 0; 

          const totalMoney = cart.reduce((sum, item) => sum + (item.isReward ? 0 : parsePrice(item.price) * item.qty), 0);
          
          // Even if the total is ₹ 0 (they are ONLY checking out a free bottle), we can bypass Cashfree
          if (totalMoney === 0) {
             const fakeOrderId = 'ORDER_' + Date.now();
             // Just save it and trigger success manually
             await supabase.from('orders').insert([{
                  order_id: fakeOrderId, customer_name: formData.name, customer_phone: formData.phone, customer_email: formData.email,
                  shipping_address: formData.address, total_amount: 0, payment_status: 'PAID', reward_ml: earnedRewardMl, claimed_reward_ml: claimedRewardMl
             }]);
             // Immediately deduct their 100 ML since we bypassed the webhook
             await supabase.from('profiles').update({ loyalty_ml: loyaltyMl - 100 }).eq('email', formData.email);
             window.location.href = `/?success=true&order_id=${fakeOrderId}`;
             return;
          }

          try {
            const response = await fetch('/create-order', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                orderAmount: totalMoney,
                customerName: formData.name, 
                customerPhone: formData.phone,
                customerEmail: formData.email,
                shippingAddress: formData.address,
                rewardMl: earnedRewardMl,          // Backend saves this
                claimedRewardMl: claimedRewardMl   // Backend saves this
              })
            });

            const data = await response.json();
            if (data.payment_session_id) {
               const cashfree = Cashfree({ mode: "sandbox" });
               cashfree.checkout({ paymentSessionId: data.payment_session_id });
            } else { alert("Error starting checkout. Please check your backend."); }
          } catch (err) { console.error("Checkout Error:", err); alert("Cannot connect to the payment server."); }
        };

        useEffect(() => {
          observerRefs.current = observerRefs.current.slice(0, PRODUCTS.length);
          const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => { if (entry.isIntersecting) setActiveSection(Number(entry.target.getAttribute('data-index'))); });
          }, { root: null, rootMargin: '-30% 0px -30% 0px', threshold: 0 }); 
          observerRefs.current.forEach((ref) => { if (ref) observer.observe(ref); });
          return () => observer.disconnect();
        }, []);

        return h('div', { className: "relative min-h-screen bg-obsessed-black text-obsessed-cream selection:bg-obsessed-gold selection:text-black" },
          
          // THE MIST PARTICLES
          mistState !== 'idle' && h('div', {
            className: `fixed z-[9999] rounded-full bg-obsessed-gold blur-[40px] mix-blend-screen pointer-events-none transition-all ease-in-out ${
                mistState === 'blooming' ? 'top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 opacity-100 duration-500' :
                mistState === 'flying' ? 'top-[calc(100vh-100px)] md:top-[calc(100vh-60px)] left-10 md:left-14 w-16 h-16 opacity-80 duration-1000' :
                mistState === 'claiming_bloom' ? 'bottom-16 left-16 w-40 h-40 opacity-100 duration-500' :
                mistState === 'claiming_fly' ? 'top-10 right-10 w-16 h-16 opacity-80 duration-1000' :
                'opacity-0'
            }`
          }),

          h(MobileMenu, { isOpen: isMenuOpen, onClose: () => setIsMenuOpen(false) }),
          
          h(Navigation, { 
              onCartClick: () => { setIsOrdersOpen(false); setIsCartOpen(true); }, 
              onOrdersClick: () => { setIsCartOpen(false); setIsOrdersOpen(true); },
              onMenuClick: () => setIsMenuOpen(true), 
              cartItemCount: cart.reduce((acc, item) => acc + item.qty, 0), 
              is3DMode, onToggle3D: () => setIs3DMode(!is3DMode), user: user
          }),
          
          h(OrdersSidebar, { isOpen: isOrdersOpen, onClose: () => setIsOrdersOpen(false), user: user, orders: myOrders, onLogout: () => { supabase.auth.signOut(); setIsOrdersOpen(false); setLoyaltyMl(0); } }),
          h(CartSidebar, { isOpen: isCartOpen, onClose: () => setIsCartOpen(false), cart, updateQty, checkout: handleCheckout, formData, setFormData, user }),
          h(SuccessModal, { isOpen: showSuccess, onTriggerMist: handleTriggerPurchaseMist, orderId: successOrderId }),
          
          // THE PERMANENT WIDGET WITH CLAIM LOGIC
          h(FloatingLoyaltyVessel, { user: user, loyaltyMl: loyaltyMl, showShine: showShine, onClaim: handleClaimFreeBottle }),
          h(VisualsLayer, { products: PRODUCTS, activeIndex: activeSection, is3DMode }),

          h('main', { className: "relative z-10 w-full pt-[10vh] md:pt-[20vh] pb-[20vh]", style: { pointerEvents: 'none' } },
            PRODUCTS.map((product, index) => (
              h('section', { key: product.id, ref: (el) => { observerRefs.current[index] = el; }, 'data-index': index, className: "min-h-screen flex items-end md:items-center justify-center md:justify-end px-4 md:px-20 lg:px-32 pb-24 md:pb-0 relative", style: { marginBottom: '10vh', pointerEvents: 'none' } },
                h('div', { className: `w-full max-w-md p-6 md:p-8 rounded-t-3xl md:rounded-sm border-t border-obsessed-gold/30 md:border-t-0 md:border-l md:border-obsessed-gold/30 transition-all duration-1000 transform bg-[#1a1a1a]/85 backdrop-blur-md md:bg-transparent mt-[55vh] md:mt-0 max-h-[45vh] md:max-h-none overflow-y-auto md:overflow-visible no-scrollbar pb-12 pointer-events-auto ${activeSection === index ? 'opacity-100 translate-y-0' : 'opacity-20 translate-y-20'}`, style: { backgroundImage: 'linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(26,26,26,0.5) 100%)' } },
                  h('h4', { className: "font-sans text-[10px] md:text-xs tracking-[0.4em] text-obsessed-gold uppercase mb-3 md:mb-4" }, `No. 0${index + 1}`),
                  h('h2', { className: "font-display text-4xl md:text-7xl mb-2 text-white" }, product.name),
                  h('p', { className: "font-serif italic text-lg md:text-xl text-obsessed-gold mb-6 md:mb-8 opacity-90" }, `"${product.tagline}"`),
                  h('div', { className: "h-px w-16 md:w-20 bg-obsessed-gold mb-6 md:mb-8" }),
                  h('p', { className: "font-sans font-light text-xs md:text-sm leading-6 md:leading-8 tracking-wide text-gray-300 mb-8 md:mb-10 whitespace-pre-line" }, product.narrative),
                  h('div', { className: "flex flex-row items-center gap-6 md:gap-8" },
                    h('div', { className: "flex flex-col" },
                      h('div', { className: "flex items-baseline gap-2 md:gap-3" }, h('span', { className: "font-display text-2xl md:text-3xl text-white" }, product.price), product.originalPrice ? h('span', { className: "font-sans text-xs md:text-sm text-gray-500 line-through" }, product.originalPrice) : null ),
                      h('span', { className: "font-sans text-[8px] md:text-[9px] text-obsessed-gold tracking-widest uppercase mt-1" }, "Launch Offer")
                    ),
                    h('button', { onClick: () => addToCart(product), className: "group relative px-6 md:px-8 py-3 bg-transparent border border-obsessed-gold overflow-hidden transition-all hover:border-white ml-auto md:ml-0" },
                      h('div', { className: "absolute inset-0 w-0 bg-obsessed-gold transition-all duration-[250ms] ease-out group-hover:w-full opacity-10" }),
                      h('span', { className: "relative font-sans text-[10px] md:text-xs tracking-[0.2em] font-bold uppercase group-hover:text-white transition-colors" }, "Acquire")
                    )
                  )
                )
              )
            ))
          )
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(h(App));
    </script>
  </body>
</html>
