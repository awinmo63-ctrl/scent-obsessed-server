                        email: user.email, name: profileData.full_name || user.user_metadata?.full_name || '',
                        phone: profileData.phone || '', street: streetData, city: c, state: s, pincode: p
                    });
                }
            };
            fetchProfileData();
        }, [user, isOrdersOpen, showSuccess]);

        const handleTriggerPurchaseMist = () => {
            setShowSuccess(false); setMistState('blooming'); setTimeout(() => setMistState('flying'), 200);
            setTimeout(() => { setMistState('idle'); setShowShine(true); setTimeout(() => setShowShine(false), 2000); }, 1400);
        };

        const handleClaimClick = () => { if (loyaltyMl < 100) return; setIsRewardModalOpen(true); };

            setIsRewardModalOpen(false); setMistState('claiming_bloom'); setTimeout(() => setMistState('claiming_fly'), 200);

                setMistState('idle');
                const freeBottle = { id: 'free-reward-' + product.id + '-' + Date.now(), name: 'Free ' + product.name, tagline: product.tagline, price: "₹ 0", originalPrice: "₹ 2,499", colorHex: product.colorHex, imageUrl: product.imageUrl, qty: 1, isReward: true };
                setCart(prev => [...prev, freeBottle]); setIsCartOpen(true);

        };

        const addToCart = (product) => {

          });

          if (!user) { notify("Please log in via the profile menu to secure your checkout."); return; }

          const totalPaidItems = cart.filter(item => !item.isReward).reduce((sum, item) => sum + item.qty, 0);

          const earnedRewardMl = totalPaidItems * 20; 
          const claimedRewardMl = hasReward ? 100 : 0; 
          const totalMoney = finalDiscountedTotal;

          const addressString = JSON.stringify({ street: formData.street, city: formData.city, state: formData.state, pincode: formData.pincode });
          await supabase.from('profiles').update({ full_name: formData.name, phone: formData.phone, shipping_address: addressString }).eq('email', formData.email);
          
          if (totalMoney === 0) {
             const fakeOrderId = 'FREE_' + Date.now();
             await supabase.from('orders').insert([{
                  order_id: fakeOrderId, customer_name: formData.name, customer_phone: formData.phone, customer_email: formData.email,

             window.location.href = `/?order_id=${fakeOrderId}`; return;
          }

          try {
            const response = await fetch('/create-order', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                orderAmount: totalMoney, customerName: formData.name, customerPhone: formData.phone, customerEmail: formData.email,
                shippingAddress: addressString, // Pass the JSON string
                rewardMl: earnedRewardMl, claimedRewardMl: claimedRewardMl, cartItems: cart, appliedPromo: appliedPromoCode
              })
            });

            const data = await response.json();
            if (data.payment_session_id) {
               const cashfree = Cashfree({ mode: "sandbox" }); cashfree.checkout({ paymentSessionId: data.payment_session_id });
            } else { notify("Error starting checkout. Please check your backend."); }

              h('h3', { className: "font-display text-xl text-obsessed-gold uppercase tracking-widest" }, "Born from Passion. Crafted for the Obsession."),
              h('p', null, "At Scent Obsessed, we believe that a fragrance is more than just a scent—it is a silent language, a lingering memory, and a powerful statement of identity."),
              h('p', null, h('strong', { className: "text-white" }, "Founded by Gurbhej Singh Brar"), h('span', null, ", Scent Obsessed was born out of a singular mission: to challenge the world of luxury perfumery by creating high-concentration, long-lasting fragrances that don't just fade into the background.")),
              h('p', null, "Based in the heart of Punjab, we combine the boldness of our heritage with the sophistication of modern global trends. We don't believe in \"subtle.\" We believe in trails that turn heads and scents that command the room."),
              h('p', { className: "text-obsessed-gold font-serif italic text-lg mt-4" }, "We aren't just selling perfume. We are inviting you to find your signature. To be bold. To be unforgettable. To be Scent Obsessed.")
            )

          h(LegalModal, { isOpen: isTermsOpen, onClose: () => setIsTermsOpen(false), title: "Terms & Conditions" }, h('div', null, h('p', null, "By accessing Scent Obsessed, you agree to comply with our terms...")) ),

          h(TrackingModal, { isOpen: isTrackingModalOpen, onClose: () => setIsTrackingModalOpen(false), order: selectedTrackingOrder }),

          h(RewardModal, { isOpen: isRewardModalOpen, onClose: () => setIsRewardModalOpen(false), onSelect: handleRewardSelection }),
          h(MobileMenu, { isOpen: isMenuOpen, onClose: () => setIsMenuOpen(false), onOpenStory: () => setIsStoryOpen(true) }),
          
          h(Navigation, { onSearchClick: () => setIsSearchOpen(!isSearchOpen), onCartClick: () => { setIsOrdersOpen(false); setIsCartOpen(true); }, onOrdersClick: () => { setIsCartOpen(false); setIsOrdersOpen(true); }, onMenuClick: () => setIsMenuOpen(true), cartItemCount: cart.reduce((acc, item) => acc + item.qty, 0), user: user }),
          h(Floating3DToggle, { is3DMode, onToggle3D: () => setIs3DMode(!is3DMode) }),

          h(CartSidebar, { isOpen: isCartOpen, onClose: () => setIsCartOpen(false), cart: cart, updateQty: updateQty, checkout: handleCheckout, formData: formData, setFormData: setFormData, notify: notify, appliedPromo: appliedPromo, setAppliedPromo: setAppliedPromo }),

          h(SuccessModal, { isOpen: showSuccess, onTriggerMist: handleTriggerPurchaseMist, orderId: successOrderId }),
          h(FailedModal, { isOpen: showFailed, onClose: () => setShowFailed(false) }),
          h(FloatingLoyaltyVessel, { user: user, loyaltyMl: loyaltyMl, showShine: showShine, onClaim: handleClaimClick, cart: cart }),
          h(VisualsLayer, { products: displayedProducts, activeIndex: activeSection, is3DMode, isSidebarActive: isSidebarActive }),

          h('main', { className: "relative z-10 w-full pt-[10vh] md:pt-[20vh] pb-[20vh]", style: { pointerEvents: 'none' } },
            displayedProducts.map((product, index) => (
              h('section', { key: product.id, ref: (el) => { observerRefs.current[index] = el; }, 'data-index': index, className: `min-h-screen flex items-end md:items-center justify-center ${isSidebarActive ? 'md:justify-start md:pl-20' : 'md:justify-end md:px-20'} lg:px-32 pb-24 md:pb-0 relative`, style: { marginBottom: '10vh', pointerEvents: 'none', transition: 'padding-left 0.5s ease-out, justify-content 0.5s ease-out' } },
                h('div', { className: `w-full max-w-md p-6 md:p-8 rounded-t-3xl md:rounded-sm border-t border-obsessed-gold/30 md:border-t-0 md:border-l md:border-obsessed-gold/30 transition-all duration-1000 transform bg-[#1a1a1a]/85 backdrop-blur-md md:bg-transparent mt-[55vh] md:mt-0 max-h-[45vh] md:max-h-none overflow-y-auto md:overflow-visible no-scrollbar pb-12 pointer-events-auto ${activeSection === index ? 'opacity-100 translate-y-0' : 'opacity-20 translate-y-20'} ${isSidebarActive ? 'scale-90' : 'scale-100'}`, style: { backgroundImage: 'linear-gradient(180deg, rgba(26,26,26,0.9) 0%, rgba(26,26,26,0.5) 100%)' } },
                  h('h4', { className: "font-sans text-[10px] md:text-xs tracking-[0.4em] text-obsessed-gold uppercase mb-3 md:mb-4" }, `No. 0${index + 1}`),
                  h('h2', { className: "font-display text-4xl md:text-7xl mb-2 text-white" }, product.name),
                  h('p', { className: "font-serif italic text-lg md:text-xl text-obsessed-gold mb-6 md:mb-8 opacity-90" }, `"${product.tagline}"`),

                      h('span', { className: "font-sans text-[8px] md:text-[9px] text-obsessed-gold tracking-widest uppercase mt-1" }, "Launch Offer")
                    ),
                    h('button', { onClick: () => addToCart(product), className: "group relative px-6 md:px-8 py-3 bg-transparent border border-obsessed-gold overflow-hidden transition-all hover:border-white ml-auto md:ml-0" },
                      h('div', { className: "absolute inset-0 w-0 bg-obsessed-gold transition-all duration-[250ms] ease-out group-hover:w-full opacity-10" }),
                      h('span', { className: "relative font-sans text-[10px] md:text-xs tracking-[0.2em] font-bold uppercase group-hover:text-white transition-colors" }, "Acquire")
                    )
                  )
                ),
                index === 0 && h('div', { className: "absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-50 animate-bounce hidden md:flex" }, h('span', { className: "text-[10px] tracking-[0.3em] uppercase mb-2" }, "Scroll to Reveal"), h(ArrowDown, { size: 16 }) )
              )
            ))

          h('footer', { className: "relative w-full bg-[#111] flex flex-col justify-between pt-24 pb-12 border-t border-obsessed-gold/20 z-20 mt-20 pointer-events-auto" },
            h('div', { className: "w-full px-8 md:px-20 grid grid-cols-1 md:grid-cols-3 gap-12 mb-20 relative z-10" },
              h('div', null,
                h('h4', { className: "font-sans text-xs text-obsessed-gold tracking-[0.2em] uppercase mb-6" }, "Discover"),

                h('button', { onClick: () => setIsStoryOpen(true), className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Our Story")
              ),
              h('div', null,
                h('h4', { className: "font-sans text-xs text-obsessed-gold tracking-[0.2em] uppercase mb-6" }, "Concierge"),
                h('a', { href: "https://mail.google.com/mail/?view=cm&fs=1&to=info@scentobsessed.in", target: "_blank", rel: "noopener noreferrer", className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "info@scentobsessed.in"),
                h('a', { href: "tel:+917814930720", className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "+91 78149 30720"),
                h('a', { href: "https://www.instagram.com/scentobsessedofficial/", target: "_blank", rel: "noopener noreferrer", className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Instagram"),
                h('a', { href: "https://wa.me/917814930720?text=Hello%2C%20I%20would%20like%20to%20track%20my%20Scent%20Obsessed%20order.", target: "_blank", rel: "noopener noreferrer", className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Track Order")
              ),
              h('div', null,
                h('h4', { className: "font-sans text-xs text-obsessed-gold tracking-[0.2em] uppercase mb-6" }, "Legal"),
                h('button', { onClick: () => setIsPrivacyOpen(true), className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Privacy Policy"),
                h('button', { onClick: () => setIsTermsOpen(true), className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Terms & Conditions"),
                h('button', { onClick: () => setIsRefundOpen(true), className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Refund & Cancellation"),
                h('button', { onClick: () => setIsShippingOpen(true), className: "font-sans text-sm text-gray-400 hover:text-white transition-colors block mt-4 uppercase tracking-widest text-[10px]" }, "Shipping Policy")
              )
            ),
            h('div', { className: "w-full flex flex-col items-center mt-12 relative z-0 overflow-hidden" },
              h('h2', { className: "font-display text-[11vw] md:text-[8.5vw] leading-none text-obsessed-gold opacity-10 whitespace-nowrap select-none pointer-events-none" }, "SCENT OBSESSED"),
              h('p', { className: "font-sans text-[9px] tracking-[0.3em] text-gray-600 mt-8 uppercase" }, "© 2026 Scent Obsessed. All Rights Reserved.")
            )
          )
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(h(App));
    </script>
